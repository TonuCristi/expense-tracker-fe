<div class="w-xs rounded-md border border-border p-4 flex flex-col">
  <h1 class="font-bold text-lg md:text-xl lg:text-2xl mb-2">Create an account!</h1>
  <p class="text-xs font-semibold text-foreground-muted mb-4">
    Watch your spending, grow your savings.
  </p>
  <form [formRoot]="registerForm" class="flex flex-col gap-4">
    @for (input of registerInputs; track input.name) {
      <div class="flex flex-col gap-1">
        <label [for]="input.id" class="text-xs font-semibold text-foreground-muted">{{
          input.label
        }}</label>
        <input
          [id]="input.id"
          [type]="input.type"
          [formField]="registerForm[input.name]"
          class="rounded-md p-2 border border-border"
        />
        @if (registerForm[input.name]().invalid() && registerForm[input.name]().touched()) {
          <span class="text-xs text-red-500 font-semibold">{{
            registerForm[input.name]().errors()[0].message
          }}</span>
        }
      </div>
    }

    <div class="mb-2">
      <app-button type="submit" [fullWidth]="true">Register</app-button>
    </div>
  </form>

  <a routerLink="/login" class="text-xs font-semibold text-foreground-muted self-center">
    Already have an account? <span class="text-primary-foreground">Login</span>
  </a>
</div>
