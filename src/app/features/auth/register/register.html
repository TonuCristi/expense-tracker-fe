<app-auth-card title="Create an account!" subtitle="Watch your spending, grow your savings.">
  <form [formRoot]="registerForm" class="mb-2 flex flex-col gap-4">
    @for (input of registerInputs; track input.name) {
      <div class="flex flex-col gap-1">
        <label [for]="input.id" class="text-foreground-muted text-xs font-semibold">{{
          input.label
        }}</label>
        <input
          [id]="input.id"
          [type]="input.type"
          [formField]="registerForm[input.name]"
          class="border-border rounded-md border p-2"
        />
        @if (registerForm[input.name]().invalid() && registerForm[input.name]().touched()) {
          <p class="text-xs font-semibold text-red-500">
            {{ registerForm[input.name]().errors()[0].message }}
          </p>
        }
      </div>
    }

    <app-button type="submit" [disabled]="authStore.isLoading()" [fullWidth]="true"
      >Register</app-button
    >
  </form>

  @if (authStore.error()) {
    <p class="mt-1 text-xs font-semibold text-red-500">{{ authStore.error() }}</p>
  }

  <div class="mt-2 self-center">
    <app-auth-switch-link prompt="Already have an account?" linkText="Login" route="/login" />
  </div>
</app-auth-card>
