<app-auth-card title="Create an account!" subtitle="Watch your spending, grow your savings.">
  <form [formRoot]="registerForm" class="flex flex-col gap-4 mb-2">
    @for (input of registerInputs; track input.name) {
      <div class="flex flex-col gap-1">
        <label [for]="input.id" class="text-xs font-semibold text-foreground-muted">{{
          input.label
        }}</label>
        <input
          [id]="input.id"
          [type]="input.type"
          [formField]="registerForm[input.name]"
          class="rounded-md p-2 border border-border"
        />
        @if (registerForm[input.name]().invalid() && registerForm[input.name]().touched()) {
          <span class="text-xs text-red-500 font-semibold">{{
            registerForm[input.name]().errors()[0].message
          }}</span>
        }
      </div>
    }

    <app-button type="submit" [disabled]="authStore.isLoading()" [fullWidth]="true"
      >Register</app-button
    >
  </form>

  @if (authStore.error()) {
    <span class="text-xs text-red-500 font-semibold mt-1">{{ authStore.error() }}</span>
  }

  <div class="self-center mt-2">
    <app-auth-switch-link prompt="Already have an account?" linkText="Login" route="/login" />
  </div>
</app-auth-card>
