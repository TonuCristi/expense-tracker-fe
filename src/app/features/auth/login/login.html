<app-auth-card title="Welcome back!" subtitle="Watch your spending, grow your savings.">
  <form [formRoot]="loginForm" class="flex flex-col gap-4">
    @for (input of loginInputs; track input.name) {
      <div class="flex flex-col gap-1">
        <label [for]="input.id" class="text-foreground-muted text-xs font-semibold">{{
          input.label
        }}</label>
        <input
          [id]="input.id"
          [type]="input.type"
          [formField]="loginForm[input.name]"
          class="border-border rounded-md border p-2"
        />
        @if (loginForm[input.name]().invalid() && loginForm[input.name]().touched()) {
          <p class="text-xs font-semibold text-red-500">
            {{ loginForm[input.name]().errors()[0].message }}
          </p>
        }
      </div>
    }

    <div class="mb-2">
      <app-button type="submit" [disabled]="authStore.isLoading()" [fullWidth]="true"
        >Login</app-button
      >
    </div>
  </form>

  @if (authStore.error()) {
    <p class="mt-1 text-xs font-semibold text-red-500">{{ authStore.error() }}</p>
  }

  <div class="mt-2 self-center">
    <app-auth-switch-link prompt="Don't have an account?" linkText="Register" route="/register" />
  </div>
</app-auth-card>
