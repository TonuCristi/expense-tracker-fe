<div class="flex gap-4">
  @for (wallet of wallets; track wallet.name) {
    <div class="bg-zinc-900 rounded-md p-4 w-3xs hover:bg-zinc-800 transition-all cursor-pointer">
      <div class="text-zinc-500 mb-1 flex items-center justify-between gap-4">
        <h3 class="font-semibold">{{ wallet.name }}</h3>
        <i class="pi pi-money-bill"></i>
      </div>
      <span class="font-bold text-2xl">{{ wallet.balance }} {{ wallet.currency }}</span>
    </div>
  }
</div>
