<h2 class="font-semibold text-zinc-500 mb-4">Last transactions</h2>

<div class="flex flex-col gap-4">
  @for (transaction of transactions; track $index) {
    <div
      class="bg-zinc-900 rounded-md p-2 sm:p-4 hover:bg-zinc-800 active:bg-zinc-800 transition-all cursor-pointer flex items-center gap-4"
    >
      <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center">
        <i [class]="`pi ${transaction.icon}`"></i>
      </div>

      <div>
        <span [class]="`font-bold text-lg lg:text-xl ${getTransactionColor(transaction.title)}`"
          >{{ transaction.amount }} EUR</span
        >
        <h3 class="font-semibold text-zinc-500">{{ transaction.title }}</h3>
      </div>
    </div>
  }
</div>
