<aside class="border-border flex h-full flex-col border-r p-4">
  <a routerLink="/" class="mb-4 inline-block px-2 text-2xl font-bold">
    <span class="hidden md:block">Trackr.</span>
    <span class="block md:hidden">T.</span>
  </a>

  <nav class="flex flex-col gap-2">
    @for (navLink of navLinks; track navLink.path) {
      <a
        [routerLink]="navLink.path"
        routerLinkActive="nav-link-active"
        class="hover:bg-primary active:bg-primary text-primary-foreground flex items-center justify-center gap-4 rounded-md p-2 font-semibold transition-all md:justify-normal"
      >
        <i [class]="navLink.iconClass"></i>
        <span class="hidden md:block">
          {{ navLink.label }}
        </span>
      </a>
    }
  </nav>

  <div class="md:border-border mt-auto flex gap-2 md:border-t md:pt-4">
    <div
      class="bg-surface flex h-10 w-10 items-center justify-center rounded-full font-semibold uppercase"
    >
      {{ userInitials() }}
    </div>
    <div class="hidden flex-col md:flex">
      <p class="font-semibold">{{ authStore.user()?.username }}</p>
      <p class="text-foreground-muted text-xs">{{ authStore.user()?.email }}</p>
    </div>
  </div>
</aside>
