<header class="p-4 border-b border-zinc-100 flex items-center justify-between">
  <a routerLink="/" class="font-bold text-lg">Trackr.</a>

  <nav class="grid grid-cols-3 items-center gap-4">
    @for (navLink of navLinks; track navLink.path) {
      <a
        [routerLink]="navLink.path"
        routerLinkActive="nav-link-active"
        class="py-1 px-2 bg-zinc-100 hover:bg-zinc-300 active:bg-zinc-300 rounded-md text-zinc-900 text-center transition-all font-semibold"
        >{{ navLink.label }}</a
      >
    }
  </nav>

  <app-button>Log out</app-button>
</header>
